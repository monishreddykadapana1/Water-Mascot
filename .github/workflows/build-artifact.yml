name: Build WaterMascot Artifact

on:
  push:
    branches:
      - antigravity-app
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: scripts/build-app.sh

      - name: Upload app zip
        uses: actions/upload-artifact@v4
        with:
          name: WaterMascot-${{ github.sha }}
          path: dist/WaterMascot.zip
          if-no-files-found: error
