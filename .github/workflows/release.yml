name: Build and Release WaterMascot

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string (example: 0.1.0)"
        required: true
        default: "0.1.0"
      build_number:
        description: "Build number"
        required: true
        default: "1"
      create_release:
        description: "Publish to GitHub Releases"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    env:
      APP_NAME: WaterMascot
      OUTPUT_DIR: dist
      TARGET_NAME: WaterMascot
      BUNDLE_ID: com.watermascot.app
      VERSION: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.version }}
      BUILD_NUMBER: ${{ github.event_name == 'push' && github.run_number || github.event.inputs.build_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: scripts/build-app.sh

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${BUILD_CERTIFICATE_BASE64}" || -z "${P12_PASSWORD}" || -z "${KEYCHAIN_PASSWORD}" ]]; then
            echo "Missing signing cert secrets. Set BUILD_CERTIFICATE_BASE64, P12_PASSWORD, and KEYCHAIN_PASSWORD."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign and notarize
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_PROFILE: ${{ secrets.NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: scripts/sign-and-notarize.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaterMascot-${{ env.VERSION }}
          path: dist/WaterMascot.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WaterMascot.zip
          generate_release_notes: true
